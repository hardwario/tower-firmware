# CI for the HARDWARIO TOWER firmware SDK.
#
# The crate is an embedded `no_std` library for the STM32L083CZ (Cortex-M0+), so the workspace
# default target is thumbv6m-none-eabi (see .cargo/config.toml). There is no hardware in CI, so we
# BUILD the firmware (lib + examples + product bins), but the actual host-side unit tests live in
# the extracted no_std leaf crates (tower-kv, tower-radio-core) — run via `just test`, which
# builds those for the host triple.
#
# The `lockstep` job enforces the golden rule: tower-protocol is pinned by git tag in TWO
# manifests here AND in the sibling consumer repos (tower-cli, tower-hil), and postcard is not
# self-describing, so a tag mismatch silently mis-decodes the wire rather than erroring. It must
# be caught in CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Build the embedded artifacts for thumbv6m (the workspace default target). The committed
  #    .cargo/config.toml sets the target, so a bare `cargo build` cross-compiles for the L0.
  embedded-build:
    name: embedded build (thumbv6m)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust (stable) + thumbv6m
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
      # Lib + product bins + educational examples. Target defaults to thumbv6m
      # (see .cargo/config.toml).
      - name: Build lib + product bins + examples
        run: cargo build --release --lib --bins --examples
      # The ~20 two-board examples gate their sender/node/peer halves behind role features, so a
      # default-feature build leaves that half of the matrix compile-unchecked. Build each role
      # so an API change that only a role-gated branch uses can't merge green (and then fail
      # mid-bench-session or in the HIL harness's build_and_flash).
      - name: Build role-gated example variants
        run: |
          cargo build --release --examples --features role-node
          cargo build --release --examples --features role-gateway
          cargo build --release --examples --features role-peer-a
          cargo build --release --examples --features role-peer-b

  # 2. Host-side unit tests: the extracted no_std cores. `just test` builds these for the host
  #    triple (the firmware itself can't test).
  host-test:
    name: host tests (just test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust (stable) + thumbv6m
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - name: Install just
        uses: extractions/setup-just@v4
      - uses: Swatinem/rust-cache@v2
      # tower-kv + tower-radio-core host tests.
      - name: just test
        run: just test

  # 3. Lint. clippy can't run `--all-targets` on thumbv6m (the tests need host libtest, which the
  #    bare-metal target lacks), so the embedded clippy covers the buildable targets.
  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust (stable) + clippy + thumbv6m
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (thumbv6m — lib, examples, bins)
        run: cargo clippy --lib --examples --bins -- -D warnings

  # 4. The golden rule: tower-protocol must be pinned to the SAME git tag in all in-repo
  #    manifests AND in the sibling consumer repos (tower-cli, tower-hil). postcard is not
  #    self-describing — a mismatch mis-decodes the wire without a build error, so it has to be
  #    checked explicitly. (The HIL harness itself lives — and compile-checks — in
  #    github.com/hardwario/tower-hil.)
  lockstep:
    name: tower-protocol lockstep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure python3 is available
        run: python3 --version
      # Local half (the firmware manifests agree) + cross-repo half (tower-cli and tower-hil pin
      # the same tag), fetched from each repo's default branch. See tools/protocol_pin_check.py;
      # the developer-facing check across local working trees is the control plane's /lockstep.
      - name: Verify tower-protocol pin (firmware + tower-cli + tower-hil)
        run: >-
          python3 tools/protocol_pin_check.py
          --peer-url https://raw.githubusercontent.com/hardwario/tower-cli/main/Cargo.toml
          --peer-url https://raw.githubusercontent.com/hardwario/tower-hil/main/Cargo.toml
